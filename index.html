<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>榮家驗屋報告產生器</title>
    
    <!-- 引入 Tailwind CSS 以進行快速且美觀的樣式設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Font Awesome 供圖示使用 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 引入 docx.js 庫以生成 Word 文件 -->
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>

    <!-- 自定義樣式 -->
    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
        }
        
        .area-container {
            transition: all 0.3s ease;
        }
        
        .photo-preview {
            aspect-ratio: 4/3;
            object-fit: cover;
            width: 100%;
            border-radius: 0.375rem;
        }

        /* 預覽模態框的列印樣式 */
        @media print {
            body * {
                visibility: hidden;
            }
            #preview-modal, #preview-modal * {
                visibility: visible;
            }
            #preview-modal {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                background: white;
            }
            .no-print {
                display: none !important;
            }
            .page-break {
                page-break-after: always;
            }
        }
        
        /* 預覽頁面樣式，模擬 A4 紙張 */
        .preview-page {
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            margin: 10mm auto;
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            box-sizing: border-box;
        }
        
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10mm;
            align-content: start;
        }
        
        .preview-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            break-inside: avoid;
        }
        
        .preview-img {
            width: 100%;
            height: 85mm;
            object-fit: contain;
            border: 1px solid #e5e7eb;
        }

        /* 隱藏原生檔案上傳按鈕 */
        input[type="file"] {
            display: none;
        }
        
        .custom-file-upload {
            display: inline-block;
            cursor: pointer;
        }
    </style>
</head>
<body class="text-gray-800 antialiased p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        
        <!-- 標題與操作區 -->
        <header class="bg-white rounded-xl shadow-md p-6 mb-8 flex flex-col md:flex-row justify-between items-center gap-4 border-t-4 border-blue-600">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">榮家驗屋報告</h1>
                <p class="text-gray-500 mt-2 text-sm">新增區域、上傳照片並添加備註，最後匯出為 Word 文件。</p>
            </div>
            <div class="flex gap-3">
                <button onclick="openPreview()" class="px-5 py-2.5 bg-indigo-50 text-indigo-700 hover:bg-indigo-100 font-medium rounded-lg transition-colors shadow-sm flex items-center gap-2">
                    <i class="fas fa-eye"></i> 預覽報告
                </button>
                <button onclick="generateWord()" class="px-5 py-2.5 bg-blue-600 text-white hover:bg-blue-700 font-medium rounded-lg transition-colors shadow-sm flex items-center gap-2">
                    <i class="fas fa-file-word"></i> 下載 Word 檔
                </button>
            </div>
        </header>

        <!-- 報告基本資訊 -->
        <section class="bg-white rounded-xl shadow-md p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2">基本資訊</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">建案名稱 / 戶別</label>
                    <input type="text" id="report-title" placeholder="例如：榮家A棟10樓" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">驗屋日期</label>
                    <input type="date" id="report-date" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
            </div>
        </section>

        <!-- 區域列表容器 -->
        <div id="areas-container" class="space-y-6">
            <!-- 區域卡片將由 JavaScript 動態生成在這裡 -->
        </div>

        <!-- 新增區域按鈕 -->
        <div class="mt-8 flex justify-center">
            <button onclick="addArea()" class="px-6 py-3 bg-white border-2 border-dashed border-gray-300 text-gray-600 hover:border-blue-500 hover:text-blue-600 font-medium rounded-xl transition-all shadow-sm flex items-center gap-2 w-full max-w-md justify-center">
                <i class="fas fa-plus-circle text-lg"></i> 新增檢驗區域 (例如：客廳、主臥)
            </button>
        </div>

    </div>

    <!-- 預覽模態框 (Modal) -->
    <div id="preview-modal" class="fixed inset-0 bg-black bg-opacity-75 z-50 hidden overflow-y-auto pt-4 pb-10 px-4">
        <div class="max-w-4xl mx-auto">
            <!-- 模態框操作列 -->
            <div class="flex justify-between items-center bg-gray-800 text-white p-4 rounded-t-xl sticky top-0 z-10 no-print">
                <h3 class="text-xl font-bold">報告預覽 (2x2 排列)</h3>
                <div class="flex gap-2">
                    <button onclick="window.print()" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg transition-colors">
                        <i class="fas fa-print"></i> 列印
                    </button>
                    <button onclick="closePreview()" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg transition-colors">
                        <i class="fas fa-times"></i> 關閉
                    </button>
                </div>
            </div>
            
            <!-- 預覽內容容器 -->
            <div id="preview-content" class="bg-gray-100 rounded-b-xl pb-8 min-h-screen">
                <!-- 預覽頁面將動態生成在這裡 -->
            </div>
        </div>
    </div>

    <!-- JavaScript 邏輯 -->
    <script>
        // 資料結構：儲存所有區域和照片的狀態
        // [{ id: 'area-1', title: '客廳', photos: [{ id: 'photo-1', dataUrl: '...', note: '...' }] }]
        let reportData = [];
        let areaCounter = 0;
        let photoCounter = 0;

        // 頁面載入時初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 預設當天日期
            document.getElementById('report-date').valueAsDate = new Date();
            // 預設加入一個區域
            addArea('客廳');
        });

        // 生成唯一 ID
        function generateId(prefix) {
            return `${prefix}-${Date.now()}-${Math.floor(Math.random() * 1000)}`;
        }

        // ==========================================
        // 區域 (Area) 相關操作
        // ==========================================

        // 新增一個區域
        function addArea(defaultTitle = '') {
            const areaId = generateId('area');
            const newArea = {
                id: areaId,
                title: defaultTitle,
                photos: []
            };
            reportData.push(newArea);
            renderAreas();
            
            // 如果是透過按鈕新增的，滾動到新區域
            if (!defaultTitle) {
                setTimeout(() => {
                    const el = document.getElementById(`card-${areaId}`);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
            }
        }

        // 刪除區域
        function removeArea(areaId) {
            if (confirm('確定要刪除此區域及其中所有照片嗎？')) {
                reportData = reportData.filter(area => area.id !== areaId);
                renderAreas();
            }
        }

        // 更新區域名稱
        function updateAreaTitle(areaId, newTitle) {
            const area = reportData.find(a => a.id === areaId);
            if (area) {
                area.title = newTitle;
            }
        }

        // ==========================================
        // 照片 (Photo) 相關操作
        // ==========================================

        // 處理圖片上傳
        function handlePhotoUpload(event, areaId) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            const area = reportData.find(a => a.id === areaId);
            if (!area) return;

            // 處理上傳的多個檔案
            Array.from(files).forEach(file => {
                if (!file.type.startsWith('image/')) return; // 只接受圖片

                const reader = new FileReader();
                reader.onload = (e) => {
                    // 將圖片壓縮以避免記憶體問題 (簡易實作)
                    compressImage(e.target.result, 1200, 1200, (compressedDataUrl) => {
                        area.photos.push({
                            id: generateId('photo'),
                            dataUrl: compressedDataUrl,
                            note: ''
                        });
                        // 重新渲染該區域的照片網格
                        renderPhotos(areaId);
                    });
                };
                reader.readAsDataURL(file);
            });
            
            // 清空 input，允許重複上傳相同檔案
            event.target.value = '';
        }

        // 圖片壓縮輔助函數
        function compressImage(dataUrl, maxWidth, maxHeight, callback) {
            const img = new Image();
            img.onload = () => {
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }
                } else {
                    if (height > maxHeight) {
                        width = Math.round((width * maxHeight) / height);
                        height = maxHeight;
                    }
                }

                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                // 轉存為 JPEG, 品質 0.8 以縮小體積，這對匯出 word 很有幫助
                callback(canvas.toDataURL('image/jpeg', 0.8));
            };
            img.src = dataUrl;
        }

        // 刪除照片
        function removePhoto(areaId, photoId) {
            const area = reportData.find(a => a.id === areaId);
            if (area) {
                area.photos = area.photos.filter(p => p.id !== photoId);
                renderPhotos(areaId);
            }
        }

        // 更新照片備註
        function updatePhotoNote(areaId, photoId, note) {
            const area = reportData.find(a => a.id === areaId);
            if (area) {
                const photo = area.photos.find(p => p.id === photoId);
                if (photo) {
                    photo.note = note;
                }
            }
        }

        // ==========================================
        // 渲染 UI (Render)
        // ==========================================

        // 渲染所有區域
        function renderAreas() {
            const container = document.getElementById('areas-container');
            container.innerHTML = '';

            reportData.forEach((area, index) => {
                const areaCard = document.createElement('div');
                areaCard.id = `card-${area.id}`;
                areaCard.className = 'area-container bg-white rounded-xl shadow-md p-6 border border-gray-100 relative';
                
                // 區域 HTML 結構
                areaCard.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-full max-w-md">
                            <label class="block text-sm font-semibold text-gray-600 mb-1">區域 ${index + 1}</label>
                            <input type="text" 
                                value="${area.title}" 
                                placeholder="輸入區域名稱，例如：客廳" 
                                onchange="updateAreaTitle('${area.id}', this.value)"
                                class="w-full text-lg font-bold border-b-2 border-gray-200 focus:border-blue-500 outline-none pb-1 bg-transparent transition-colors">
                        </div>
                        <button onclick="removeArea('${area.id}')" class="text-red-400 hover:text-red-600 p-2 rounded-full hover:bg-red-50 transition-colors" title="刪除區域">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>

                    <!-- 照片網格容器 -->
                    <div id="photos-container-${area.id}" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
                        <!-- 照片將渲染在這裡 -->
                    </div>

                    <!-- 上傳按鈕區 -->
                    <div class="mt-4 border-t pt-4">
                        <label class="custom-file-upload px-4 py-2 bg-blue-50 text-blue-600 hover:bg-blue-100 rounded-lg transition-colors cursor-pointer inline-flex items-center gap-2 font-medium">
                            <input type="file" multiple accept="image/*" onchange="handlePhotoUpload(event, '${area.id}')">
                            <i class="fas fa-camera"></i> 新增照片到此區
                        </label>
                        <span class="text-xs text-gray-400 ml-3">可一次選擇多張</span>
                    </div>
                `;
                container.appendChild(areaCard);
                
                // 渲染該區域的照片
                renderPhotos(area.id);
            });
        }

        // 渲染指定區域內的照片
        function renderPhotos(areaId) {
            const container = document.getElementById(`photos-container-${areaId}`);
            if (!container) return;
            
            container.innerHTML = '';
            
            const area = reportData.find(a => a.id === areaId);
            if (!area || area.photos.length === 0) {
                // 沒有照片時顯示提示
                const emptyState = document.createElement('div');
                emptyState.className = 'col-span-full py-8 text-center text-gray-400 bg-gray-50 rounded-lg border border-dashed border-gray-200';
                emptyState.innerHTML = '<i class="fas fa-images text-3xl mb-2 opacity-50"></i><p class="text-sm">尚未上傳照片</p>';
                container.appendChild(emptyState);
                return;
            }

            area.photos.forEach(photo => {
                const photoCard = document.createElement('div');
                photoCard.className = 'bg-gray-50 rounded-lg p-2 border border-gray-200 group relative';
                
                photoCard.innerHTML = `
                    <div class="relative mb-2">
                        <img src="${photo.dataUrl}" alt="驗屋照片" class="photo-preview bg-gray-200">
                        <button onclick="removePhoto('${areaId}', '${photo.id}')" class="absolute top-1 right-1 bg-red-500 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition-opacity shadow" title="刪除照片">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <textarea 
                        placeholder="點此輸入備註說明..." 
                        onchange="updatePhotoNote('${areaId}', '${photo.id}', this.value)"
                        class="w-full text-sm p-2 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none resize-none h-20"
                    >${photo.note}</textarea>
                `;
                container.appendChild(photoCard);
            });
        }

        // ==========================================
        // 預覽功能 (Preview)
        // ==========================================

        function openPreview() {
            const modal = document.getElementById('preview-modal');
            const container = document.getElementById('preview-content');
            
            // 收集基本資料
            const title = document.getElementById('report-title').value || '未命名的驗屋報告';
            const dateStr = document.getElementById('report-date').value;
            
            // 建立預覽 HTML
            let previewHTML = '';
            
            // 展平所有照片，並附加所屬區域名稱
            let allPhotos = [];
            reportData.forEach(area => {
                area.photos.forEach(photo => {
                    allPhotos.push({
                        areaTitle: area.title || '未命名區域',
                        dataUrl: photo.dataUrl,
                        note: photo.note
                    });
                });
            });

            if (allPhotos.length === 0) {
                alert('請至少上傳一張照片以進行預覽。');
                return;
            }

            // 將照片分頁，每頁最多 4 張 (2x2)
            const photosPerPage = 4;
            const totalPages = Math.ceil(allPhotos.length / photosPerPage);

            for (let page = 0; page < totalPages; page++) {
                const pagePhotos = allPhotos.slice(page * photosPerPage, (page + 1) * photosPerPage);
                
                previewHTML += `
                    <div class="preview-page page-break relative">
                        <!-- 頁首 -->
                        <div class="flex justify-between items-end border-b-2 border-black pb-2 mb-4">
                            <h2 class="text-2xl font-bold">${title}</h2>
                            <div class="text-sm">日期：${dateStr}</div>
                        </div>
                        
                        <!-- 2x2 照片網格 -->
                        <div class="preview-grid">
                `;

                // 填入照片
                pagePhotos.forEach(item => {
                    // 替換換行符號為 <br>
                    const displayNote = item.note ? item.note.replace(/\n/g, '<br>') : '&nbsp;';
                    
                    previewHTML += `
                        <div class="preview-item">
                            <div class="bg-gray-200 flex items-center justify-center overflow-hidden h-[85mm]">
                                <img src="${item.dataUrl}" class="preview-img">
                            </div>
                            <div class="font-bold text-sm mt-1 border-l-4 border-blue-600 pl-2">${item.areaTitle}</div>
                            <div class="text-sm mt-1 flex-grow border border-gray-300 p-2 min-h-[40px]">${displayNote}</div>
                        </div>
                    `;
                });

                previewHTML += `
                        </div>
                        
                        <!-- 頁尾頁碼 -->
                        <div class="absolute bottom-[10mm] right-[20mm] text-sm text-gray-500">
                            第 ${page + 1} 頁 / 共 ${totalPages} 頁
                        </div>
                    </div>
                `;
            }

            container.innerHTML = previewHTML;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // 防止背景捲動
        }

        function closePreview() {
            const modal = document.getElementById('preview-modal');
            modal.classList.add('hidden');
            document.body.style.overflow = '';
        }

        // ==========================================
        // 匯出 Word 功能 (Generate DOCX)
        // ==========================================

        async function generateWord() {
            console.log('開始產生 Word');
            try {
                // 檢查 docx 庫是否載入
                if (typeof docx === 'undefined') {
                    alert('載入 Word 產生庫失敗，請檢查網路連線後重試。');
                    return;
                }

                // 提取基本資料
                const reportTitle = document.getElementById('report-title').value || '驗屋報告';
                const reportDate = document.getElementById('report-date').value;

                // 準備圖片資料
                let allItems = [];
                reportData.forEach(area => {
                    area.photos.forEach(photo => {
                        allItems.push({
                            areaTitle: area.title || '未命名區域',
                            dataUrl: photo.dataUrl,
                            note: photo.note || ''
                        });
                    });
                });

                if (allItems.length === 0) {
                    alert('沒有照片可以匯出，請先上傳照片。');
                    return;
                }

                // 顯示載入中提示
                const btn = document.querySelector('button[onclick="generateWord()"]');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 產生中...';
                btn.disabled = true;

                // 確保 UI 有時間渲染「產生中...」狀態，再進行繁重運算
                await new Promise(resolve => setTimeout(resolve, 100));

                // 解構 docx 物件
                const { Document, Packer, Paragraph, TextRun, ImageRun, Table, TableRow, TableCell, WidthType, BorderStyle, AlignmentType, VerticalAlign, PageBreak, Header, Footer, PageNumber } = docx;

                // 將 Base64 轉換為 ArrayBuffer (改用原生 fetch，解決資料破損導致的無反應問題)
                for (let item of allItems) {
                    if (item.dataUrl) {
                        const response = await fetch(item.dataUrl);
                        item.imageBuffer = await response.arrayBuffer();
                    }
                }

                // 創建文件的 Sections
                const sections = [];
                
                // 分頁處理 (每頁 4 張, 2x2)
                const photosPerPage = 4;
                const totalPages = Math.ceil(allItems.length / photosPerPage);

                for (let page = 0; page < totalPages; page++) {
                    const pageItems = allItems.slice(page * photosPerPage, (page + 1) * photosPerPage);
                    const children = [];

                    // --- 頁首標題 ---
                    children.push(
                        new Paragraph({
                            children: [
                                new TextRun({ text: reportTitle, bold: true, size: 36 }), // 18pt
                            ],
                            alignment: AlignmentType.LEFT,
                        }),
                        new Paragraph({
                            children: [
                                new TextRun({ text: `日期: ${reportDate}`, size: 24, color: "666666" }), // 12pt
                            ],
                            alignment: AlignmentType.RIGHT,
                            border: {
                                bottom: { color: "000000", space: 1, style: BorderStyle.SINGLE, size: 6 }
                            },
                            spacing: { after: 400 } // 留白
                        })
                    );

                    // --- 準備 2x2 表格 ---
                    const rows = [];

                    // 處理前兩張照片 (Row 1 & 2)
                    const item1 = pageItems[0];
                    const item2 = pageItems[1];
                    
                    if (item1) {
                        rows.push(createImageRow(item1, item2, ImageRun, WidthType, BorderStyle, AlignmentType));
                        rows.push(createTextRow(item1, item2, Paragraph, TextRun, WidthType, BorderStyle, VerticalAlign));
                    }

                    // 處理後兩張照片 (Row 3 & 4)
                    const item3 = pageItems[2];
                    const item4 = pageItems[3];

                    if (item3) {
                        // 加入一個間距行
                        rows.push(
                            new TableRow({
                                children: [
                                    new TableCell({ children: [], borders: noBorders(BorderStyle) }),
                                    new TableCell({ children: [], borders: noBorders(BorderStyle) })
                                ],
                                height: { value: 300, rule: "exact" }
                            })
                        );
                        rows.push(createImageRow(item3, item4, ImageRun, WidthType, BorderStyle, AlignmentType));
                        rows.push(createTextRow(item3, item4, Paragraph, TextRun, WidthType, BorderStyle, VerticalAlign));
                    }

                    // 建立表格
                    const table = new Table({
                        rows: rows,
                        width: { size: 100, type: WidthType.PERCENTAGE },
                        borders: noBorders(BorderStyle)
                    });

                    children.push(table);

                    // 加入分頁符
                    if (page < totalPages - 1) {
                        children.push(new Paragraph({ children: [new PageBreak()] }));
                    }

                    if (page === 0) {
                        sections.push({
                            properties: {},
                            headers: {
                                default: new Header({
                                    children: [
                                        new Paragraph({
                                            text: "榮家驗屋紀錄表",
                                            alignment: AlignmentType.RIGHT,
                                            style: "Header"
                                        })
                                    ]
                                })
                            },
                            footers: {
                                default: new Footer({
                                    children: [
                                        new Paragraph({
                                            alignment: AlignmentType.CENTER,
                                            children: [
                                                new TextRun("第 "),
                                                new TextRun({ children: [PageNumber.CURRENT] }),
                                                new TextRun(" 頁，共 "),
                                                new TextRun({ children: [PageNumber.TOTAL_PAGES] }),
                                                new TextRun(" 頁"),
                                            ],
                                        })
                                    ]
                                })
                            },
                            children: children
                        });
                    } else {
                        sections[0].children.push(...children);
                    }
                }

                const doc = new Document({ sections: sections });

                console.log("DOCX 建立完成");
                const blob = await Packer.toBlob(doc);
                console.log("準備下載");
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${reportTitle}_${reportDate}.docx`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                
                btn.innerHTML = '<i class="fas fa-file-word"></i> 下載 Word 檔';
                btn.disabled = false;

            } catch (error) {
                console.error("生成 Word 文件時發生錯誤:", error);
                alert("生成檔案時發生錯誤：" + error.message);
                const btn = document.querySelector('button[onclick="generateWord()"]');
                if(btn) {
                    btn.innerHTML = '<i class="fas fa-file-word"></i> 下載 Word 檔';
                    btn.disabled = false;
                }
            }
        }

        // --- Word 產生輔助函數 ---

        function noBorders(BorderStyle) {
            return {
                top: { style: BorderStyle.NONE, size: 0, color: "auto" },
                bottom: { style: BorderStyle.NONE, size: 0, color: "auto" },
                left: { style: BorderStyle.NONE, size: 0, color: "auto" },
                right: { style: BorderStyle.NONE, size: 0, color: "auto" },
                insideHorizontal: { style: BorderStyle.NONE, size: 0, color: "auto" },
                insideVertical: { style: BorderStyle.NONE, size: 0, color: "auto" },
            };
        }

        function createCellBorders(BorderStyle) {
            return {
                top: { style: BorderStyle.SINGLE, size: 1, color: "cccccc" },
                bottom: { style: BorderStyle.SINGLE, size: 1, color: "cccccc" },
                left: { style: BorderStyle.SINGLE, size: 1, color: "cccccc" },
                right: { style: BorderStyle.SINGLE, size: 1, color: "cccccc" },
            };
        }

        // 創建包含圖片的行
        function createImageRow(item1, item2, ImageRunRef, WidthTypeRef, BorderStyleRef, AlignmentTypeRef) {
            const cells = [];
            
            cells.push(new docx.TableCell({
                children: [
                    new docx.Paragraph({
                        children: [
                            new ImageRunRef({
                                data: item1.imageBuffer,
                                transformation: { width: 300, height: 225 }
                            })
                        ],
                        alignment: AlignmentTypeRef.CENTER
                    })
                ],
                width: { size: 50, type: WidthTypeRef.PERCENTAGE }, // 修正：必須為數字 50，不能是字串 "50%"
                borders: createCellBorders(BorderStyleRef),
                margins: { top: 100, bottom: 100, left: 100, right: 100 }
            }));

            if (item2) {
                cells.push(new docx.TableCell({
                    children: [
                        new docx.Paragraph({
                            children: [
                                new ImageRunRef({
                                    data: item2.imageBuffer,
                                    transformation: { width: 300, height: 225 }
                                })
                            ],
                            alignment: AlignmentTypeRef.CENTER
                        })
                    ],
                    width: { size: 50, type: WidthTypeRef.PERCENTAGE },
                    borders: createCellBorders(BorderStyleRef),
                    margins: { top: 100, bottom: 100, left: 100, right: 100 }
                }));
            } else {
                cells.push(new docx.TableCell({
                    children: [],
                    width: { size: 50, type: WidthTypeRef.PERCENTAGE },
                    borders: noBorders(BorderStyleRef)
                }));
            }

            return new docx.TableRow({ children: cells });
        }

        // 創建包含說明的行
        function createTextRow(item1, item2, ParagraphRef, TextRunRef, WidthTypeRef, BorderStyleRef, VerticalAlignRef) {
            const createNoteParagraphs = (areaTitle, note) => {
                const pgs = [
                    new ParagraphRef({
                        children: [new TextRunRef({ text: `【${areaTitle}】`, bold: true, color: "0052cc", size: 24 })],
                        spacing: { before: 100, after: 100 }
                    })
                ];
                
                if (note) {
                    const lines = note.split('\n');
                    lines.forEach(line => {
                        pgs.push(new ParagraphRef({
                            children: [new TextRunRef({ text: line, size: 22 })],
                            spacing: { after: 50 }
                        }));
                    });
                } else {
                    pgs.push(new ParagraphRef({ children: [] }));
                }
                return pgs;
            };

            const borderStyles = {
                left: { style: BorderStyleRef.SINGLE, size: 1, color: "cccccc" },
                right: { style: BorderStyleRef.SINGLE, size: 1, color: "cccccc" },
                bottom: { style: BorderStyleRef.SINGLE, size: 1, color: "cccccc" },
                top: { style: BorderStyleRef.NONE, size: 0, color: "auto" },
            };

            const cells = [];

            cells.push(new docx.TableCell({
                children: createNoteParagraphs(item1.areaTitle, item1.note),
                width: { size: 50, type: WidthTypeRef.PERCENTAGE }, // 修正：必須為數字 50
                borders: borderStyles,
                margins: { top: 100, bottom: 200, left: 150, right: 150 },
                verticalAlign: VerticalAlignRef.TOP
            }));

            if (item2) {
                cells.push(new docx.TableCell({
                    children: createNoteParagraphs(item2.areaTitle, item2.note),
                    width: { size: 50, type: WidthTypeRef.PERCENTAGE },
                    borders: borderStyles,
                    margins: { top: 100, bottom: 200, left: 150, right: 150 },
                    verticalAlign: VerticalAlignRef.TOP
                }));
            } else {
                cells.push(new docx.TableCell({
                    children: [],
                    width: { size: 50, type: WidthTypeRef.PERCENTAGE },
                    borders: noBorders(BorderStyleRef)
                }));
            }

            return new docx.TableRow({ children: cells });
        }
    </script>
</body>
